<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>卡丁车计时器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0a0a0a;
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #fff;
        }

        #app {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 6px;
            gap: 6px;
        }

        /* 顶部控制栏 */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 12px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 10px;
            flex-shrink: 0;
        }

        .control-btns {
            display: flex;
            gap: 8px;
        }

        .btn {
            padding: 8px 18px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-start {
            background: linear-gradient(135deg, #00b894 0%, #00a085 100%);
            color: white;
        }

        .btn-start:hover {
            transform: scale(1.05);
        }

        .btn-stop {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            color: white;
        }

        .btn-reset {
            background: linear-gradient(135deg, #636e72 0%, #2d3436 100%);
            color: white;
        }

        .top-stats {
            display: flex;
            gap: 20px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-label {
            font-size: 10px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 16px;
            font-weight: 700;
            font-family: 'Courier New', monospace;
        }

        .best-lap {
            color: #00b894;
        }

        /* 主体区域：左右布局 */
        .main-content {
            flex: 1;
            display: flex;
            gap: 6px;
            min-height: 0;
        }

        /* 左侧：Delta + 当前圈速 */
        .left-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a0a 70%);
            border-radius: 14px;
            position: relative;
            overflow: hidden;
        }

        .left-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                linear-gradient(90deg, transparent 48%, rgba(0,184,148,0.03) 50%, transparent 52%),
                linear-gradient(0deg, transparent 48%, rgba(0,184,148,0.03) 50%, transparent 52%);
            background-size: 40px 40px;
            pointer-events: none;
        }

        /* Delta 显示 */
        .delta-container {
            text-align: center;
            margin-bottom: 16px;
        }

        .delta-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .delta-value {
            font-size: 80px;
            font-weight: 900;
            font-family: 'Courier New', monospace;
            line-height: 1;
            text-shadow: 0 0 30px currentColor;
            transition: color 0.1s;
        }

        .delta-fast {
            color: #00ff88;
            text-shadow: 0 0 40px #00ff88, 0 0 80px #00ff88;
        }

        .delta-slow {
            color: #ff4757;
            text-shadow: 0 0 40px #ff4757, 0 0 80px #ff4757;
        }

        .delta-neutral {
            color: #888;
        }

        /* 当前圈速 */
        .current-lap {
            text-align: center;
        }

        .current-lap-label {
            font-size: 11px;
            color: #666;
            margin-bottom: 2px;
        }

        .current-lap-time {
            font-size: 32px;
            font-weight: 700;
            font-family: 'Courier New', monospace;
            color: #fff;
        }

        /* GPS 状态 */
        .gps-status {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 10px;
            color: #666;
        }

        .gps-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #333;
        }

        .gps-dot.active {
            background: #00ff88;
            box-shadow: 0 0 10px #00ff88;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* 右侧面板 */
        .right-panel {
            width: 340px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-height: 0;
        }

        /* 地图区域 */
        .map-section {
            height: 180px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 14px;
            padding: 8px;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .map-title {
            font-size: 10px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .map-container {
            flex: 1;
            background: #0a0a0a;
            border-radius: 8px;
            position: relative;
            overflow: hidden;
        }

        #trackMap {
            width: 100%;
            height: 100%;
            display: block;
        }

        .map-overlay {
            position: absolute;
            bottom: 6px;
            left: 6px;
            font-size: 9px;
            color: #666;
            background: rgba(0,0,0,0.6);
            padding: 2px 6px;
            border-radius: 4px;
        }

        /* 圈速列表 */
        .laps-section {
            flex: 1;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 14px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .laps-header {
            display: flex;
            justify-content: space-between;
            padding: 0 8px 6px;
            border-bottom: 1px solid #333;
            font-size: 10px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            flex-shrink: 0;
        }

        .laps-list {
            flex: 1;
            overflow-y: auto;
            min-height: 0;
        }

        .laps-list::-webkit-scrollbar {
            width: 3px;
        }

        .laps-list::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 2px;
        }

        .lap-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 8px;
            border-bottom: 1px solid #1a1a2e;
            font-size: 13px;
        }

        .lap-row:last-child {
            border-bottom: none;
        }

        .lap-row.current {
            background: rgba(255,255,255,0.05);
            border-radius: 6px;
        }

        .lap-row.best {
            background: rgba(0,184,148,0.1);
        }

        .lap-num {
            width: 45px;
            color: #888;
            flex-shrink: 0;
        }

        .lap-time {
            flex: 1;
            font-family: 'Courier New', monospace;
            font-weight: 600;
            color: #fff;
            text-align: center;
        }

        .lap-delta {
            width: 80px;
            font-family: 'Courier New', monospace;
            font-weight: 600;
            text-align: right;
            flex-shrink: 0;
        }

        .lap-delta.fast {
            color: #00ff88;
        }

        .lap-delta.slow {
            color: #ff4757;
        }

        .best-badge {
            font-size: 9px;
            padding: 1px 5px;
            background: #00b894;
            color: #000;
            border-radius: 3px;
            margin-left: 6px;
            font-weight: 700;
        }

        /* 首次使用提示 */
        .intro-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            z-index: 200;
        }

        .intro-overlay.hidden {
            display: none;
        }

        .intro-title {
            font-size: 24px;
            margin-bottom: 20px;
            text-align: center;
        }

        .intro-text {
            font-size: 14px;
            color: #888;
            line-height: 1.6;
            text-align: center;
            margin-bottom: 30px;
        }

        .intro-btn {
            padding: 16px 40px;
            background: linear-gradient(135deg, #00b894 0%, #00a085 100%);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- 顶部控制栏 -->
        <div class="top-bar">
            <div class="control-btns">
                <button class="btn btn-start" id="startBtn" onclick="toggleTimer()">开始</button>
                <button class="btn btn-reset" onclick="resetTimer()">重置</button>
            </div>
            <div class="top-stats">
                <div class="stat-item">
                    <div class="stat-label">最快圈</div>
                    <div class="stat-value best-lap" id="bestLapDisplay">--:--.---</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">总圈数</div>
                    <div class="stat-value" id="totalLapsDisplay">0</div>
                </div>
            </div>
        </div>

        <!-- 主体区域：左右布局 -->
        <div class="main-content">
            <!-- 左侧：Delta + 当前圈速 -->
            <div class="left-panel">
                <div class="gps-status">
                    <span>GPS</span>
                    <div class="gps-dot" id="gpsDot"></div>
                </div>

                <div class="delta-container">
                    <div class="delta-label">与最快圈差距</div>
                    <div class="delta-value delta-neutral" id="deltaDisplay">--.---</div>
                </div>

                <div class="current-lap">
                    <div class="current-lap-label">当前圈速</div>
                    <div class="current-lap-time" id="currentLapDisplay">00:00.000</div>
                </div>
            </div>

            <!-- 右侧：地图 + 圈速列表 -->
            <div class="right-panel">
                <!-- 地图区域 -->
                <div class="map-section">
                    <div class="map-title">赛道轨迹</div>
                    <div class="map-container">
                        <canvas id="trackMap"></canvas>
                        <div class="map-overlay" id="mapOverlay">等待GPS信号...</div>
                    </div>
                </div>

                <!-- 圈速列表 -->
                <div class="laps-section">
                    <div class="laps-header">
                        <span style="width: 45px;">圈数</span>
                        <span style="flex: 1; text-align: center;">圈速</span>
                        <span style="width: 80px; text-align: right;">差距</span>
                    </div>
                    <div class="laps-list" id="lapsList">
                        <!-- 动态生成 -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 首次使用提示 -->
    <div class="intro-overlay" id="introOverlay">
        <div class="intro-title">🏎️ 卡丁车计时器</div>
        <div class="intro-text">
            本应用需要获取您的 GPS 位置用于自动分圈计时。<br><br>
            请在开始计时前将手机固定在卡丁车上，<br>
            第一圈经过起终点时会自动标记位置。<br><br>
            点击"开始"后，应用会自动检测每圈并记录时间。
        </div>
        <button class="intro-btn" onclick="dismissIntro()">我知道了</button>
    </div>

    <script>
        // ==================== 状态管理 ====================
        let isRunning = false;
        let startTime = 0;
        let currentLapStartTime = 0;
        let laps = [];
        let bestLapTime = Infinity;
        let bestLapIndex = -1;
        let animationId = null;

        // GPS 相关
        let startPosition = null;
        let lastPosition = null;
        let gpsWatchId = null;
        let hasSetStartLine = false;
        let lastLapCompletedTime = 0;
        const LAP_DETECTION_DISTANCE = 20;
        const MIN_LAP_TIME = 15000;

        // 轨迹记录
        let trackPoints = []; // 所有轨迹点
        let currentLapPoints = []; // 当前圈的轨迹点

        // 地图相关
        let mapCanvas = null;
        let mapCtx = null;

        // DOM 元素
        const startBtn = document.getElementById('startBtn');
        const currentLapDisplay = document.getElementById('currentLapDisplay');
        const deltaDisplay = document.getElementById('deltaDisplay');
        const bestLapDisplay = document.getElementById('bestLapDisplay');
        const totalLapsDisplay = document.getElementById('totalLapsDisplay');
        const lapsList = document.getElementById('lapsList');
        const gpsDot = document.getElementById('gpsDot');
        const mapOverlay = document.getElementById('mapOverlay');

        // ==================== 初始化地图 ====================
        function initMap() {
            mapCanvas = document.getElementById('trackMap');
            mapCtx = mapCanvas.getContext('2d');
            resizeMap();
            window.addEventListener('resize', resizeMap);
        }

        function resizeMap() {
            const container = mapCanvas.parentElement;
            const rect = container.getBoundingClientRect();
            mapCanvas.width = rect.width;
            mapCanvas.height = rect.height;
            drawMap();
        }

        // ==================== 绘制地图 ====================
        function drawMap() {
            if (!mapCtx) return;

            const w = mapCanvas.width;
            const h = mapCanvas.height;

            // 清空画布
            mapCtx.fillStyle = '#0a0a0a';
            mapCtx.fillRect(0, 0, w, h);

            // 绘制网格
            mapCtx.strokeStyle = 'rgba(0, 184, 148, 0.1)';
            mapCtx.lineWidth = 1;
            const gridSize = 30;
            for (let x = 0; x < w; x += gridSize) {
                mapCtx.beginPath();
                mapCtx.moveTo(x, 0);
                mapCtx.lineTo(x, h);
                mapCtx.stroke();
            }
            for (let y = 0; y < h; y += gridSize) {
                mapCtx.beginPath();
                mapCtx.moveTo(0, y);
                mapCtx.lineTo(w, y);
                mapCtx.stroke();
            }

            // 如果没有轨迹点，显示提示
            if (trackPoints.length < 2) {
                mapCtx.fillStyle = '#666';
                mapCtx.font = '12px sans-serif';
                mapCtx.textAlign = 'center';
                mapCtx.fillText('等待GPS轨迹...', w / 2, h / 2);
                return;
            }

            // 计算轨迹边界
            let minLat = Infinity, maxLat = -Infinity;
            let minLng = Infinity, maxLng = -Infinity;

            trackPoints.forEach(p => {
                minLat = Math.min(minLat, p.lat);
                maxLat = Math.max(maxLat, p.lat);
                minLng = Math.min(minLng, p.lng);
                maxLng = Math.max(maxLng, p.lng);
            });

            // 添加边距
            const padding = 20;
            const latRange = Math.max(maxLat - minLat, 0.0001);
            const lngRange = Math.max(maxLng - minLng, 0.0001);
            const scale = Math.min((w - padding * 2) / lngRange, (h - padding * 2) / latRange);

            // 坐标转换函数
            const toCanvasX = (lng) => padding + (lng - minLng) * scale;
            const toCanvasY = (lat) => h - padding - (lat - minLat) * scale;

            // 绘制历史轨迹（灰色）
            if (trackPoints.length > 1) {
                mapCtx.beginPath();
                mapCtx.strokeStyle = 'rgba(100, 100, 100, 0.5)';
                mapCtx.lineWidth = 2;
                mapCtx.moveTo(toCanvasX(trackPoints[0].lng), toCanvasY(trackPoints[0].lat));
                for (let i = 1; i < trackPoints.length; i++) {
                    mapCtx.lineTo(toCanvasX(trackPoints[i].lng), toCanvasY(trackPoints[i].lat));
                }
                mapCtx.stroke();
            }

            // 绘制当前圈轨迹（绿色渐变）
            if (currentLapPoints.length > 1) {
                for (let i = 1; i < currentLapPoints.length; i++) {
                    const alpha = 0.3 + (i / currentLapPoints.length) * 0.7;
                    mapCtx.beginPath();
                    mapCtx.strokeStyle = `rgba(0, 255, 136, ${alpha})`;
                    mapCtx.lineWidth = 3;
                    mapCtx.moveTo(
                        toCanvasX(currentLapPoints[i - 1].lng),
                        toCanvasY(currentLapPoints[i - 1].lat)
                    );
                    mapCtx.lineTo(
                        toCanvasX(currentLapPoints[i].lng),
                        toCanvasY(currentLapPoints[i].lat)
                    );
                    mapCtx.stroke();
                }
            }

            // 绘制起点/终点线
            if (startPosition) {
                const startX = toCanvasX(startPosition.lng);
                const startY = toCanvasY(startPosition.lat);

                // 终点线标记
                mapCtx.beginPath();
                mapCtx.strokeStyle = '#00ff88';
                mapCtx.lineWidth = 3;
                mapCtx.moveTo(startX - 10, startY);
                mapCtx.lineTo(startX + 10, startY);
                mapCtx.stroke();

                // 起点圆圈
                mapCtx.beginPath();
                mapCtx.fillStyle = 'rgba(0, 255, 136, 0.3)';
                mapCtx.arc(startX, startY, 15, 0, Math.PI * 2);
                mapCtx.fill();
                mapCtx.beginPath();
                mapCtx.strokeStyle = '#00ff88';
                mapCtx.lineWidth = 2;
                mapCtx.arc(startX, startY, 15, 0, Math.PI * 2);
                mapCtx.stroke();

                // START标签
                mapCtx.fillStyle = '#00ff88';
                mapCtx.font = 'bold 8px sans-serif';
                mapCtx.textAlign = 'center';
                mapCtx.fillText('START', startX, startY + 25);
            }

            // 绘制当前位置
            if (lastPosition) {
                const currentX = toCanvasX(lastPosition.lng);
                const currentY = toCanvasY(lastPosition.lat);

                // 当前位置光晕
                const gradient = mapCtx.createRadialGradient(currentX, currentY, 0, currentX, currentY, 12);
                gradient.addColorStop(0, 'rgba(255, 255, 255, 0.8)');
                gradient.addColorStop(0.5, 'rgba(255, 255, 255, 0.3)');
                gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
                mapCtx.fillStyle = gradient;
                mapCtx.beginPath();
                mapCtx.arc(currentX, currentY, 12, 0, Math.PI * 2);
                mapCtx.fill();

                // 当前位置点
                mapCtx.beginPath();
                mapCtx.fillStyle = '#fff';
                mapCtx.arc(currentX, currentY, 5, 0, Math.PI * 2);
                mapCtx.fill();
            }

            // 更新状态显示
            if (trackPoints.length > 0) {
                mapOverlay.textContent = `轨迹点: ${trackPoints.length}`;
            }
        }

        // ==================== 计时器核心 ====================
        function toggleTimer() {
            if (!isRunning) {
                startTimer();
            } else {
                stopTimer();
            }
        }

        function startTimer() {
            if (!navigator.geolocation) {
                alert('您的设备不支持 GPS 定位');
                return;
            }

            isRunning = true;
            startBtn.textContent = '停止';
            startBtn.classList.remove('btn-start');
            startBtn.classList.add('btn-stop');

            const now = Date.now();
            startTime = now;
            currentLapStartTime = now;
            lastLapCompletedTime = now;

            startGPSTracking();
            updateDisplay();
        }

        function stopTimer() {
            isRunning = false;
            startBtn.textContent = '开始';
            startBtn.classList.remove('btn-stop');
            startBtn.classList.add('btn-start');

            if (gpsWatchId !== null) {
                navigator.geolocation.clearWatch(gpsWatchId);
                gpsWatchId = null;
            }

            if (animationId !== null) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }

            gpsDot.classList.remove('active');
        }

        function resetTimer() {
            stopTimer();
            startTime = 0;
            currentLapStartTime = 0;
            laps = [];
            bestLapTime = Infinity;
            bestLapIndex = -1;
            startPosition = null;
            lastPosition = null;
            hasSetStartLine = false;
            lastLapCompletedTime = 0;
            trackPoints = [];
            currentLapPoints = [];

            currentLapDisplay.textContent = '00:00.000';
            deltaDisplay.textContent = '--.---';
            deltaDisplay.className = 'delta-value delta-neutral';
            bestLapDisplay.textContent = '--:--.---';
            totalLapsDisplay.textContent = '0';
            lapsList.innerHTML = '';
            mapOverlay.textContent = '等待GPS信号...';
            drawMap();
        }

        // ==================== 显示更新 ====================
        function updateDisplay() {
            if (!isRunning) return;

            const now = Date.now();
            const currentLapElapsed = now - currentLapStartTime;
            currentLapDisplay.textContent = formatTime(currentLapElapsed);

            updateDelta(currentLapElapsed);

            animationId = requestAnimationFrame(updateDisplay);
        }

        function updateDelta(currentLapElapsed) {
            if (bestLapTime === Infinity || laps.length === 0) {
                deltaDisplay.textContent = '--.---';
                deltaDisplay.className = 'delta-value delta-neutral';
                return;
            }

            const delta = currentLapElapsed - bestLapTime;
            const deltaSec = delta / 1000;

            if (delta < 0) {
                deltaDisplay.textContent = (deltaSec > -0.001 ? '-' : '') + deltaSec.toFixed(3);
                deltaDisplay.className = 'delta-value delta-fast';
            } else {
                deltaDisplay.textContent = '+' + deltaSec.toFixed(3);
                deltaDisplay.className = 'delta-value delta-slow';
            }
        }

        // ==================== GPS 追踪 ====================
        function startGPSTracking() {
            gpsWatchId = navigator.geolocation.watchPosition(
                handlePosition,
                handlePositionError,
                {
                    enableHighAccuracy: true,
                    timeout: 5000,
                    maximumAge: 0
                }
            );
        }

        function handlePosition(position) {
            gpsDot.classList.add('active');

            const coords = {
                lat: position.coords.latitude,
                lng: position.coords.longitude,
                accuracy: position.coords.accuracy,
                timestamp: position.timestamp
            };

            // 记录轨迹点
            trackPoints.push(coords);
            currentLapPoints.push(coords);

            // 限制轨迹点数量，防止内存过大
            if (trackPoints.length > 5000) {
                trackPoints = trackPoints.slice(-4000);
            }

            if (!hasSetStartLine) {
                startPosition = coords;
                lastPosition = coords;
                hasSetStartLine = true;
                drawMap();
                return;
            }

            if (isRunning) {
                const timeSinceLastLap = Date.now() - lastLapCompletedTime;
                const distanceToStart = calculateDistance(startPosition, coords);
                
                if (distanceToStart < LAP_DETECTION_DISTANCE && timeSinceLastLap > MIN_LAP_TIME) {
                    completeLap();
                }
            }

            lastPosition = coords;
            drawMap();
        }

        function handlePositionError(error) {
            console.error('GPS 错误:', error);
            gpsDot.classList.remove('active');
        }

        // ==================== 圈速管理 ====================
        function completeLap() {
            const now = Date.now();
            const lapTime = now - currentLapStartTime;

            const lap = {
                lapNumber: laps.length + 1,
                lapTime: lapTime,
                timestamp: now
            };

            laps.push(lap);
            lastLapCompletedTime = now;

            if (lapTime < bestLapTime) {
                bestLapTime = lapTime;
                bestLapIndex = laps.length - 1;
            }

            updateLapDisplay();
            
            // 开始新一圈，重置当前圈轨迹
            currentLapPoints = [];
            currentLapStartTime = now;
        }

        function updateLapDisplay() {
            bestLapDisplay.textContent = bestLapTime === Infinity ? '--:--.---' : formatTime(bestLapTime);
            totalLapsDisplay.textContent = laps.length;

            lapsList.innerHTML = laps.slice().reverse().map((lap, index) => {
                const actualIndex = laps.length - 1 - index;
                const isBest = actualIndex === bestLapIndex;
                const isCurrent = actualIndex === laps.length - 1;
                
                let deltaStr = '';
                let deltaClass = '';
                
                if (!isBest && bestLapTime !== Infinity) {
                    const delta = lap.lapTime - bestLapTime;
                    if (delta > 0) {
                        deltaStr = '+' + (delta / 1000).toFixed(3);
                        deltaClass = 'slow';
                    }
                } else if (isBest) {
                    deltaStr = '最快';
                    deltaClass = 'fast';
                }

                return `
                    <div class="lap-row ${isCurrent ? 'current' : ''} ${isBest ? 'best' : ''}">
                        <span class="lap-num">第${lap.lapNumber}圈</span>
                        <span class="lap-time">${formatTime(lap.lapTime)}${isBest ? '<span class="best-badge">BEST</span>' : ''}</span>
                        <span class="lap-delta ${deltaClass}">${deltaStr}</span>
                    </div>
                `;
            }).join('');

            // 自动滚动到顶部（最新圈）
            lapsList.scrollTop = 0;
        }

        // ==================== 工具函数 ====================
        function formatTime(ms) {
            const minutes = Math.floor(ms / 60000);
            const seconds = Math.floor((ms % 60000) / 1000);
            const milliseconds = Math.floor(ms % 1000);
            return `${pad2(minutes)}:${pad2(seconds)}.${pad3(milliseconds)}`;
        }

        function pad2(n) {
            return n.toString().padStart(2, '0');
        }

        function pad3(n) {
            return n.toString().padStart(3, '0');
        }

        function calculateDistance(pos1, pos2) {
            const R = 6371000;
            const lat1 = toRadians(pos1.lat);
            const lat2 = toRadians(pos2.lat);
            const deltaLat = toRadians(pos2.lat - pos1.lat);
            const deltaLng = toRadians(pos2.lng - pos1.lng);

            const a = Math.sin(deltaLat / 2) * Math.sin(deltaLat / 2) +
                      Math.cos(lat1) * Math.cos(lat2) *
                      Math.sin(deltaLng / 2) * Math.sin(deltaLng / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));

            return R * c;
        }

        function toRadians(degrees) {
            return degrees * Math.PI / 180;
        }

        // ==================== 首次使用提示 ====================
        function dismissIntro() {
            document.getElementById('introOverlay').classList.add('hidden');
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    () => console.log('GPS 权限已获取'),
                    (err) => console.error('GPS 权限被拒绝:', err)
                );
            }
        }

        // ==================== 初始化 ====================
        window.addEventListener('DOMContentLoaded', () => {
            initMap();
        });

        if (screen.orientation && screen.orientation.lock) {
            screen.orientation.lock('landscape').catch(() => {});
        }

        document.addEventListener('touchmove', function(e) {
            e.preventDefault();
        }, { passive: false });

        document.addEventListener('gesturestart', function(e) {
            e.preventDefault();
        });
    </script>
</body>
</html>
